name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Confirm tag matches package version
        run: |
          package_version="$(python -c 'import runpy; print(runpy.run_path("src/repro_evidence_kit/__init__.py")["__version__"])')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - run: python -m pip install build twine
      - run: python -m build
      - run: python scripts/check_dist.py
      - name: Generate build provenance attestations
        uses: actions/attest@v4
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish release to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/repro-evidence-kit
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
